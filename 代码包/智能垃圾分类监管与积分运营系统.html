<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能垃圾分类监管与积分运营系统</title>
    <style>
        :root {
            --green: #2E9E62;
            --green-dark: #1f7044;
            --green-light: #e8f5e9;
            --orange: #FF9500;
            --orange-light: #fff3e0;
            --blue-recycle: #1976D2;
            --red-harmful: #E53935;
            --brown-kitchen: #8B5A2B;
            --gray-other: #757575;
            --white: #ffffff;
            --bg: #f5f6f8;
            --text: #333333;
            --text-light: #888888;
            --border: #e0e0e0;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
            --radius: 8px;
            --radius-lg: 16px;
            --font-title: 18px;
            --font-body: 14px;
            --font-small: 12px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #eef1f5;
            color: var(--text);
            font-size: var(--font-body);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
        }

        /* ============ 全局角色切换顶部导航 ============ */
        .global-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 8px 16px;
            flex-wrap: wrap;
        }
        .global-nav .nav-label {
            color: #aaa;
            font-size: 12px;
            margin-right: 8px;
            white-space: nowrap;
        }
        .global-nav button {
            padding: 7px 16px;
            border: 1px solid #444;
            background: transparent;
            color: #ccc;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: var(--transition);
            white-space: nowrap;
        }
        .global-nav button:hover {
            border-color: #888;
            color: #fff;
        }
        .global-nav button.active {
            background: var(--green);
            border-color: var(--green);
            color: #fff;
            font-weight: 600;
        }
        .global-nav button.active.merchant-nav {
            background: var(--orange);
            border-color: var(--orange);
        }
        .global-nav button.active.admin-nav {
            background: var(--green-dark);
            border-color: var(--green-dark);
        }

        /* ============ 主容器 ============ */
        .app-container {
            margin-top: 52px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: calc(100vh - 52px);
            padding: 16px;
        }

        /* ============ 手机模拟框(小程序) ============ */
        .phone-frame {
            width: 375px;
            min-height: 700px;
            background: var(--white);
            border-radius: 24px;
            box-shadow: var(--shadow-lg), 0 0 0 4px #333, 0 0 0 6px #555;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .phone-frame .status-bar {
            height: 28px;
            background: #f8f8f8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 11px;
            color: #333;
            flex-shrink: 0;
        }
        .phone-frame .phone-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            max-height: 680px;
            padding-bottom: 60px;
        }
        .phone-frame .phone-content::-webkit-scrollbar {
            width: 3px;
        }
        .phone-frame .phone-content::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        /* ============ Web后台容器 ============ */
        .web-frame {
            width: 100%;
            max-width: 1440px;
            min-height: 780px;
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .web-topbar {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
            color: #fff;
        }
        .web-topbar.merchant {
            background: var(--orange);
        }
        .web-topbar.admin {
            background: var(--green-dark);
        }
        .web-topbar .topbar-title {
            font-weight: 700;
            font-size: 16px;
        }
        .web-topbar .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
        }
        .web-topbar .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: var(--transition);
        }
        .web-topbar .logout-btn:hover {
            background: rgba(255, 255, 255, 0.35);
        }
        .web-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .web-sidebar {
            width: 220px;
            flex-shrink: 0;
            background: #fafbfc;
            border-right: 1px solid var(--border);
            padding: 12px 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .web-sidebar.admin-sidebar {
            width: 240px;
            background: #1a2a1f;
            color: #ccc;
        }
        .web-sidebar .sidebar-item {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 13px;
            transition: var(--transition);
            border-left: 3px solid transparent;
            color: #555;
            white-space: nowrap;
        }
        .web-sidebar .sidebar-item:hover {
            background: #eef2f6;
            color: #333;
        }
        .web-sidebar .sidebar-item.active {
            background: #e8f5e9;
            color: var(--green);
            border-left-color: var(--green);
            font-weight: 600;
        }
        .web-sidebar.admin-sidebar .sidebar-item {
            color: #bcc9be;
        }
        .web-sidebar.admin-sidebar .sidebar-item:hover {
            background: #263528;
            color: #e0e0e0;
        }
        .web-sidebar.admin-sidebar .sidebar-item.active {
            background: #1f3d28;
            color: #6ee7a8;
            border-left-color: #6ee7a8;
        }
        .web-main {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            background: #f9fafb;
        }
        .web-main::-webkit-scrollbar {
            width: 5px;
        }
        .web-main::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 4px;
        }

        /* ============ 通用组件 ============ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: var(--font-body);
            font-weight: 500;
            transition: var(--transition);
            white-space: nowrap;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-green {
            background: var(--green);
            color: #fff;
        }
        .btn-green:hover {
            background: #258b52;
            box-shadow: 0 4px 16px rgba(46, 158, 98, 0.3);
        }
        .btn-green:disabled {
            background: #b0d4c0;
            cursor: not-allowed;
            box-shadow: none;
        }
        .btn-orange {
            background: var(--orange);
            color: #fff;
        }
        .btn-orange:hover {
            background: #e68600;
            box-shadow: 0 4px 16px rgba(255, 149, 0, 0.3);
        }
        .btn-outline {
            background: #fff;
            border: 1.5px solid var(--green);
            color: var(--green);
        }
        .btn-outline:hover {
            background: var(--green-light);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
        }
        .btn-danger {
            background: var(--red-harmful);
            color: #fff;
        }
        .btn-danger:hover {
            background: #c62828;
        }
        .card {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            transition: var(--transition);
        }
        .card:hover {
            box-shadow: var(--shadow-lg);
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 12px;
        }
        .input-group label {
            font-size: 13px;
            font-weight: 500;
            color: #555;
        }
        .input-field {
            display: flex;
            align-items: center;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 12px;
            gap: 8px;
            transition: var(--transition);
            background: #fafbfc;
        }
        .input-field:focus-within {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(46, 158, 98, 0.08);
            background: #fff;
        }
        .input-field input {
            border: none;
            outline: none;
            flex: 1;
            font-size: var(--font-body);
            background: transparent;
            color: #333;
        }
        .input-field .icon-slot {
            color: #999;
            font-size: 16px;
            flex-shrink: 0;
        }
        .input-field .toggle-pw {
            cursor: pointer;
            color: #aaa;
            font-size: 14px;
            flex-shrink: 0;
            user-select: none;
        }

        /* ============ 登录页 ============ */
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }
        .login-tabs {
            display: flex;
            width: 100%;
            border-bottom: 1px solid #eee;
        }
        .login-tab {
            flex: 1;
            text-align: center;
            padding: 14px;
            cursor: pointer;
            font-weight: 500;
            font-size: 15px;
            color: #999;
            transition: var(--transition);
            position: relative;
            background: #fafbfc;
            border: none;
        }
        .login-tab.active {
            color: var(--green);
            background: #fff;
            font-weight: 700;
        }
        .login-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 30%;
            right: 30%;
            height: 3px;
            background: var(--green);
            border-radius: 2px 2px 0 0;
        }
        .login-logo-area {
            text-align: center;
            padding: 28px 20px 16px;
        }
        .login-logo-icon {
            font-size: 48px;
            margin-bottom: 6px;
        }
        .login-logo-area h2 {
            font-size: 18px;
            font-weight: 700;
            color: #222;
        }
        .login-logo-area .subtitle {
            font-size: 12px;
            color: #aaa;
            margin-top: 2px;
        }
        .login-form-area {
            padding: 8px 28px 24px;
            width: 100%;
        }
        .login-form-area .login-method-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .login-method-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            border: 1.5px solid #e0e0e0;
            background: #fff;
            transition: var(--transition);
        }
        .login-method-tab.active {
            border-color: var(--green);
            background: var(--green-light);
            color: var(--green);
            font-weight: 600;
        }
        .wechat-login-btn {
            width: 100%;
            padding: 13px;
            background: #07c160;
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.5px;
        }
        .wechat-login-btn:hover {
            background: #06a052;
            box-shadow: 0 4px 16px rgba(7, 193, 96, 0.35);
        }
        .login-hint {
            font-size: 11px;
            color: #bbb;
            text-align: center;
            margin-top: 8px;
        }
        .login-check-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #777;
            margin: 8px 0;
        }
        .login-check-row input[type="checkbox"] {
            accent-color: var(--green);
        }
        .link-text {
            color: var(--green);
            cursor: pointer;
            font-size: 13px;
        }
        .link-text:hover {
            text-decoration: underline;
        }

        /* ============ 小程序首页 ============ */
        .mini-banner {
            background: linear-gradient(135deg, #2E9E62 0%, #1f7044 100%);
            color: #fff;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            border-radius: 0 0 16px 16px;
        }
        .mini-banner .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .mini-banner .points-display {
            text-align: center;
            flex: 1;
        }
        .mini-banner .points-num {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .mini-banner .points-label {
            font-size: 11px;
            opacity: 0.85;
        }
        .mini-banner .detail-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
        }
        .mini-banner .detail-btn:hover {
            background: rgba(255, 255, 255, 0.35);
        }
        .mini-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 14px;
        }
        .mini-grid-card {
            border-radius: var(--radius);
            padding: 16px 12px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .mini-grid-card:active {
            transform: scale(0.95);
        }
        .mini-grid-card .card-icon {
            font-size: 32px;
        }
        .mini-grid-card.green-card {
            background: linear-gradient(135deg, #2E9E62, #3cb371);
        }
        .mini-grid-card.blue-card {
            background: linear-gradient(135deg, #1976D2, #42a5f5);
        }
        .mini-grid-card.orange-card {
            background: linear-gradient(135deg, #FF9500, #ffb74d);
        }
        .mini-grid-card.gray-card {
            background: linear-gradient(135deg, #757575, #9e9e9e);
        }
        .mini-notice {
            margin: 0 14px 10px;
            padding: 12px;
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            font-size: 12px;
            border-left: 3px solid var(--green);
            color: #555;
            max-height: 60px;
            overflow: hidden;
        }
        .mini-notice .notice-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 2px;
            font-size: 13px;
        }
        .mini-notice .marquee {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            animation: marquee 12s linear infinite;
        }
        @keyframes marquee {
            0% {
                transform: translateX(100%);
            }
            100% {
                transform: translateX(-100%);
            }
        }

        /* 底部Tab */
        .bottom-tabs {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: #fff;
            border-top: 1px solid #eee;
            padding: 6px 0;
            padding-bottom: max(6px, env(safe-area-inset-bottom));
            z-index: 10;
        }
        .bottom-tab {
            flex: 1;
            text-align: center;
            cursor: pointer;
            font-size: 10px;
            color: #999;
            transition: var(--transition);
            padding: 4px 0;
        }
        .bottom-tab .tab-icon {
            font-size: 20px;
            display: block;
            margin-bottom: 2px;
        }
        .bottom-tab.active {
            color: var(--green);
            font-weight: 600;
        }

        /* ============ 弹窗 ============ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal-dialog {
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 24px;
            max-width: 360px;
            width: 90%;
            box-shadow: var(--shadow-lg);
            text-align: center;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal-dialog h4 {
            margin-bottom: 8px;
            font-size: 16px;
        }
        .modal-dialog .modal-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }
        .modal-dialog .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            justify-content: center;
        }
        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e0e0e0;
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 3000;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 1.8s forwards;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
        }
        .toast.success {
            background: var(--green);
        }
        .toast.error {
            background: var(--red-harmful);
        }

        /* ============ Web后台组件 ============ */
        .stat-cards-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            text-align: center;
            transition: var(--transition);
            border-top: 3px solid var(--green);
        }
        .stat-card.orange-border {
            border-top-color: var(--orange);
        }
        .stat-card.blue-border {
            border-top-color: var(--blue-recycle);
        }
        .stat-card.red-border {
            border-top-color: var(--red-harmful);
        }
        .stat-card .stat-num {
            font-size: 26px;
            font-weight: 700;
            color: #222;
        }
        .stat-card .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }
        .chart-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }
        .chart-card h4 {
            font-size: 14px;
            color: #444;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .table-wrap {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        table th,
        table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
            white-space: nowrap;
        }
        table th {
            background: #f9fafb;
            font-weight: 600;
            color: #555;
            font-size: 12px;
        }
        table tr:hover {
            background: #f8fdf9;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-success {
            background: #e8f5e9;
            color: #2E9E62;
        }
        .badge-warning {
            background: #fff3e0;
            color: #FF9500;
        }
        .badge-danger {
            background: #ffebee;
            color: #E53935;
        }
        .badge-info {
            background: #e3f2fd;
            color: #1976D2;
        }

        /* 简易图表 */
        .simple-bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 150px;
            padding: 8px 0;
        }
        .simple-bar {
            flex: 1;
            border-radius: 6px 6px 0 0;
            transition: var(--transition);
            min-width: 20px;
            position: relative;
            cursor: pointer;
        }
        .simple-bar:hover {
            opacity: 0.8;
        }
        .simple-bar .bar-val {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #555;

        // ==================== Toast ====================
        function showToast(msg, type = '') {
            const container = document.getElementById('globalToastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2200);
        }

        // ==================== 弹窗 ====================
        function showModal(html) {
            const container = document.getElementById('globalModalContainer');
            container.innerHTML = `
            <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
              ${html}
            </div>`;
        }

        function closeModal() {
            document.getElementById('globalModalContainer').innerHTML = '';
        }

        // ==================== 全局视图切换 ====================
        function switchGlobalView(view, btn) {
            APP_STATE.currentView = view;
            document.querySelectorAll('#globalNav button').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            else {
                // 根据view给对应按钮加active
                const map = { login: 0, resident: 1, merchant: 2, admin: 3 };
                const idx = map[view] || 0;
                const buttons = document.querySelectorAll('#globalNav button');
                if (buttons[idx]) buttons[idx].classList.add('active');
            }
            renderView();
            closeModal();
        }

        function renderView() {
            const container = document.getElementById('appContainer');
            switch (APP_STATE.currentView) {
                case 'login':
                    container.innerHTML = renderLoginPage();
                    container.style.justifyContent = 'center';
                    container.style.alignItems = 'center';
                    bindLoginEvents();
                    break;
                case 'resident':
                    container.innerHTML = renderResidentPage();
                    container.style.justifyContent = 'center';
                    container.style.alignItems = 'flex-start';
                    bindResidentEvents();
                    break;
                case 'merchant':
                    container.innerHTML = renderMerchantPage();
                    container.style.justifyContent = 'center';
                    container.style.alignItems = 'flex-start';
                    bindMerchantEvents();
                    break;
                case 'admin':
                    container.innerHTML = renderAdminPage();
                    container.style.justifyContent = 'center';
                    container.style.alignItems = 'flex-start';
                    bindAdminEvents();
                    break;
            }
        }

        // ==================== 登录页渲染 ====================
        function renderLoginPage() {
            const isResident = APP_STATE.loginType === 'resident';
            const isWechat = APP_STATE.residentLoginMethod === 'wechat';
            return `
            <div class="login-container">

                  <button class="login-method-tab ${!isWechat ? 'active' : ''}" id="methodPhone">🔑 手机号密码登录</button>
                </div>
                ${isWechat ? `
                <button class="wechat-login-btn" id="wechatLoginBtn">💚 微信一键登录</button>
                <p class="login-hint">授权微信自动绑定手机号，开通积分账户</p>

              </div>
            </div>`;
        }

        function bindLoginEvents() {
            // Tab切换
            const tabResident = document.getElementById('tabResident');
            const tabMerchant = document.getElementById('tabMerchant');
            if (tabResident) tabResident.addEventListener('click', () => {
                APP_STATE.loginType = 'resident';
                renderView();
            });
            if (tabMerchant) tabMerchant.addEventListener('click', () => {
                APP_STATE.loginType = 'merchant';
                renderView();
            });

            // 居民登录方式切换
            const methodWechat = document.getElementById('methodWechat');
            const methodPhone = document.getElementById('methodPhone');
            if (methodWechat) methodWechat.addEventListener('click', () => {
                APP_STATE.residentLoginMethod = 'wechat';
                renderView();
            });
            if (methodPhone) methodPhone.addEventListener('click', () => {
                APP_STATE.residentLoginMethod = 'phone';
                renderView();
            });

            // 密码显隐
            document.querySelectorAll('.toggle-pw').forEach(el => {
                el.addEventListener('click', function() {
                    const input = this.parentElement.querySelector('input');
                    if (input.type === 'password') {
                        input.type = 'text';
                        this.textContent = '🙈';
                    } else {
                        input.type = 'password';
                        this.textContent = '👁️';
                    }
                });
            });

            // 登录按钮
            const loginBtn = document.getElementById('loginSubmitBtn');
            if (loginBtn) {
                loginBtn.addEventListener('click', () => {
                    if (APP_STATE.loginType === 'resident') {
                        if (APP_STATE.residentLoginMethod === 'wechat') {
                            // 微信登录
                            showModal(`
                        <div class="modal-dialog">
                          <div class="loading-spinner"></div>
                          <p>正在校验账号信息...</p>

                                closeModal();

                                setTimeout(() => switchGlobalView('resident', null), 600);
                            }, 1500);
                        } else {
                            const phone = document.getElementById('phoneInput')?.value.trim();
                            const pw = document.getElementById('pwInput')?.value.trim();
                            if (!phone || !pw) {
                                showToast('⚠️ 请填写完整信息', 'error');
                                return;
                            }
                            showModal(`
                        <div class="modal-dialog">
                          <div class="loading-spinner"></div>
                          <p>正在校验账号信息...</p>
                        </div>`);
                            setTimeout(() => {
                                closeModal();
                                if (phone.length < 11) {
                                    showToast('❌ 手机号格式不正确', 'error');
                                } else {
                                    showToast('✅ 登录成功！', 'success');
                                    setTimeout(() => switchGlobalView('resident', null), 600);
                                }
                            }, 1200);
                        }
                    } else {
                        const acc = document.getElementById('merchantAccountInput')?.value.trim();
                        const pw = document.getElementById('merchantPwInput')?.value.trim();
                        if (!acc || !pw) {
                            showToast('⚠️ 请填写完整信息', 'error');
                            return;
                        }
                        showModal(`
                    <div class="modal-dialog">
                      <div class="loading-spinner"></div>
                      <p>正在校验商家账号...</p>
                    </div>`);
                        setTimeout(() => {
                            closeModal();
                            // 模拟审核状态
                            if (acc.includes('pending')) {
                                showModal(`
                          <div class="modal-dialog">
                            <div class="modal-icon">⚠️</div>
                            <h4 style="color:#E53935;">账号未审核</h4>
                            <p style="font-size:13px;color:#666;">您的商家账号尚在审核中，请耐心等待管理员审核通过。</p>
                            <div class="modal-btns">
                              <button class="btn btn-orange btn-sm" onclick="closeModal()">我知道了</button>
                            </div>
                          </div>`);
                            } else if (acc.includes('block')) {
                                showModal(`
                          <div class="modal-dialog">
                            <div class="modal-icon">🚫</div>
                            <h4 style="color:#E53935;">账号已被禁用</h4>
                            <p style="font-size:13px;color:#666;">请联系管理员处理。</p>
                            <div class="modal-btns">
                              <button class="btn btn-outline btn-sm" onclick="closeModal()">关闭</button>
                            </div>
                          </div>`);
                            } else {
                                showToast('✅ 商家登录成功！', 'success');
                                setTimeout(() => switchGlobalView('merchant', null), 600);
                            }
                        }, 1200);
                    }
                });
            }

            // 商家入驻申请
            const applyLink = document.getElementById('merchantApplyLink');
            if (applyLink) {
                applyLink.addEventListener('click', () => {
                    showModal(`
                <div class="modal-dialog" style="text-align:left;">
                  <h4 style="text-align:center;">🏪 商家入驻申请</h4>
                  <div class="input-group"><label>店铺名称</label>
                    <div class="input-field"><input type="text" placeholder="请输入店铺名称"></div>
                  </div>
                  <div class="input-group"><label>联系人</label>
                    <div class="input-field"><input type="text" placeholder="请输入联系人"></div>
                  </div>
                  <div class="input-group"><label>联系电话</label>
                    <div class="input-field"><input type="tel" placeholder="请输入联系电话"></div>
                  </div>

                    <button class="btn btn-outline btn-sm" onclick="closeModal()">取消</button>
                    <button class="btn btn-green btn-sm" onclick="closeModal();showToast('✅ 入驻申请已提交，请等待审核','success')">提交申请</button>
                  </div>
                </div>`);
                });
            }
        }

            checked.forEach(cb => {

                    APP_STATE.merchantOrders.pendingVerify = Math.max(0, APP_STATE.merchantOrders
                        .pendingVerify - 1);

                    <tr><td>有害垃圾</td><td style="color:#2E9E62;">+20</td><td style="color:#E53935;">-10</td><td>2026-01-01</td><td><button class="btn btn-outline btn-sm" onclick="showToast('编辑规则弹窗','')">✏️编辑</button></td></tr>
                    <tr><td>其他垃圾</td><td style="color:#2E9E62;">+5</td><td style="color:#E53935;">-2</td><td>2026-01-01</td><td><button class="btn btn-outline btn-sm" onclick="showToast('编辑规则弹窗','')">✏️编辑</button></td></tr>

                  <div style="margin-top:12px;display:flex;gap:8px;">
                    <button class="btn btn-green btn-sm">📢 发布新规则</button>
                    <button class="btn btn-outline btn-sm" onclick="showToast('已回退至上一版本','success')">↩ 版本回退</button>
                    <button class="btn btn-orange btn-sm" onclick="showToast('✅ 规则已同步全终端','success')">🔄 同步全终端</button>
                  </div>`;
                case 'aiModel':
                    return `
                  <h4>🤖 AI识别模型迭代管理</h4>
                  <table>
                    <tr><th>版本号</th><th>训练时间</th><th>识别准确率</th><th>上线状态</th><th>操作</th></tr>
                    <tr><td>v3.2.1</td><td>2026-06-20</td><td style="color:#2E9E62;">96.8%</td><td><span class="badge badge-success">🟢在线</span></td><td><button class="btn btn-outline btn-sm">切换</button></td></tr>
                    <tr><td>v3.2.0</td><td>2026-05-15</td><td>95.2%</td><td><span class="badge badge-info">📦历史</span></td><td><button class="btn btn-outline btn-sm">切换至此版本</button></td></tr>
                    <tr><td>v3.1.5</td><td>2026-04-01</td><td>93.5%</td><td><span class="badge badge-info">📦历史</span></td><td><button class="btn btn-outline btn-sm">切换至此版本</button></td></tr>
                  </table>
                  <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
                    <button class="btn btn-green btn-sm" onclick="showImportDatasetModal()">📥 导入新数据集</button>
                    <button class="btn btn-orange btn-sm" onclick="showTrainingModal()">🔄 增量训练</button>
                    <button class="btn btn-green btn-sm" onclick="showToast('✅ 新版本已上线','success')">🚀 上线新版本</button>
                  </div>`;
                case 'analysis':
                    return `
                  <h4>📊 大模型商业数据分析报告</h4>
                  <div class="input-group" style="max-width:300px;"><label>选择分析周期</label>
                    <div style="display:flex;gap:8px;"><input type="date" value="2026-06-01" style="padding:6px;border:1px solid #ddd;border-radius:6px;"> <span>至</span> <input type="date" value="2026-06-24" style="padding:6px;border:1px solid #ddd;border-radius:6px;"></div>
                  </div>
                  <div class="card" style="margin-top:12px;">
                    <h5>📋 报告摘要</h5>
                    <ul style="font-size:13px;padding-left:18px;line-height:2;">
                      <li>📈 居民消费趋势：<b>环保日用品需求上升18%</b></li>

                  <button class="btn btn-green btn-sm" style="margin-top:12px;" onclick="showToast('📤 报告已推送至对应商家后台','success')">📤 一键推送至商家后台</button>`;
                case 'logs':
                    return `

                  <table>
                    <tr><th>操作时间</th><th>操作人</th><th>操作类型</th><th>详情</th><th>IP地址</th></tr>

                    <tr><td>2026-06-22 09:00</td><td>系统</td><td>自动备份</td><td>数据库自动备份完成</td><td>-</td></tr>

                  <p style="font-size:12px;color:#888;margin-top:10px;">📌 支持分页浏览、导出Excel日志</p>`;

        function bindAdminEvents() {
            document.querySelectorAll('#adminSidebar .sidebar-item').forEach(item => {
                item.addEventListener('click', function() {
                    const page = this.dataset.page;
                    APP_STATE.adminSidebarActive = page;
                    renderView();
                });
            });
        }

        function auditAction(name, action) {
            if (action === 'reject') {
                showModal(`
              <div class="modal-dialog">
                <div class="modal-icon">⚠️</div>
                <h4 style="color:#E53935;">确认驳回</h4>
                <p>确定要驳回「<b>${name}</b>」的入驻申请吗？</p>
                <div class="modal-btns">
                  <button class="btn btn-outline btn-sm" onclick="closeModal()">取消</button>
                  <button class="btn btn-danger btn-sm" onclick="closeModal();removeAudit('${name}');showToast('❌ 已驳回 ${name}','error')">确认驳回</button>
                </div>
              </div>`);
            } else {
                showModal(`
              <div class="modal-dialog">
                <div class="modal-icon">✅</div>
                <h4 style="color:#2E9E62;">确认通过</h4>
                <p>确定要通过「<b>${name}</b>」的入驻申请吗？</p>
                <div class="modal-btns">
                  <button class="btn btn-outline btn-sm" onclick="closeModal()">取消</button>
                  <button class="btn btn-green btn-sm" onclick="closeModal();removeAudit('${name}');showToast('✅ 已通过 ${name} 的入驻申请','success')">确认通过</button>
                </div>
              </div>`);
            }
        }

        function removeAudit(name) {
            APP_STATE.auditList = APP_STATE.auditList.filter(a => a.name !== name);
            APP_STATE.adminStats.pendingAudit = Math.max(0, APP_STATE.adminStats.pendingAudit - 1);
            renderView();
        }

        function showImportDatasetModal() {
            showModal(`
            <div class="modal-dialog">
              <h4>📥 导入新数据集</h4>
              <div class="input-field" style="margin:12px 0;"><input type="file" accept=".zip,.csv,.json"></div>
              <p style="font-size:11px;color:#888;">支持上传Excel/CSV/JSON格式数据集文件</p>
              <div class="modal-btns">
                <button class="btn btn-outline btn-sm" onclick="closeModal()">取消</button>
                <button class="btn btn-green btn-sm" onclick="closeModal();showToast('✅ 数据集导入成功，可开始增量训练','success')">确认导入</button>
              </div>
            </div>`);
        }

        function showTrainingModal() {
            showModal(`
            <div class="modal-dialog">
              <h4>🔄 增量训练</h4>
              <div class="loading-spinner"></div>
              <p>模型训练中...</p>
              <p style="font-size:11px;color:#888;">预计需要5-15分钟，请耐心等待</p>
              <div style="background:#eee;border-radius:4px;height:8px;margin:10px 0;"><div id="trainProgress" style="background:#2E9E62;width:0%;height:100%;border-radius:4px;transition:width 0.5s;"></div></div>
              <p style="font-size:11px;color:#888;" id="trainPercent">0%</p>
            </div>`);
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15 + 5;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        closeModal();
                        showToast('✅ 训练完成！准确率提升至97.2%', 'success');
                    }, 600);
                }
                const progEl = document.getElementById('trainProgress');
                const percEl = document.getElementById('trainPercent');
                if (progEl) progEl.style.width = progress + '%';
                if (percEl) percEl.textContent = Math.round(progress) + '%';
            }, 600);
        }

        // ==================== 初始化 ====================
        function init() {
            renderView();
        }

        document.addEventListener('DOMContentLoaded', init);

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
            if (e.ctrlKey && e.key === '1') { e.preventDefault();
                switchGlobalView('login', null); }
            if (e.ctrlKey && e.key === '2') { e.preventDefault();
                switchGlobalView('resident', null); }
            if (e.ctrlKey && e.key === '3') { e.preventDefault();
                switchGlobalView('merchant', null); }
            if (e.ctrlKey && e.key === '4') { e.preventDefault();
                switchGlobalView('admin', null); }
        });

        console.log('🌿 智能垃圾分类监管与积分运营系统 已就绪');
        console.log('🔀 使用顶部导航切换视角 | Ctrl+1~4 快捷键切换');
        console.log('📱 居民小程序 | 🏪 商家后台 | 🛡️ 管理总后台');
        console.log('💡 点击各功能卡片体验完整交互流程');
    </script>
